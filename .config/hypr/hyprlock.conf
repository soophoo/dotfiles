general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/eliphaz/Pictures/Wallpapers/reze-arc-chainsaw-man-2560x1600-v0-dcfb0k8zqz6g1.webp
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(230, 230, 230, 0.9)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.9)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 54
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.3
    dots_center = true
    fade_on_empty = false
    rounding = 14
    font_color = rgb(255, 255, 255)
    inner_color = rgba(20, 20, 20, 0.55)
    outer_color = rgba(255, 255, 255, 0.35)
    check_color = rgb(255, 182, 193)
    fail_color = rgb(229, 57, 53)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -180
    halign = center
    valign = center
}
