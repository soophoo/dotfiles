# Change prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Enable extended keys (allows Ctrl+Enter to work in apps like Claude Code)
set -g extended-keys on
set -as terminal-features ',*:extkeys'

# Split panes with | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Status bar colors
set -g status-style "bg=colour233,fg=white"

# Inactive window
set -g window-status-style "bg=colour233,fg=colour245"
set -g window-status-format " #I #W"

# Active window - bold white text, light blue asterisk
set -g window-status-current-style "bg=colour233,fg=white,bold"
set -g window-status-current-format " #I #W#[fg=colour117]*"

# Pane borders
set -g pane-border-style "fg=colour236"
set -g pane-active-border-style "fg=white"

# Message/command line
set -g message-style "bg=colour236,fg=white"

# Clear left/right status to remove pwd and other info
set -g status-left ""
set -g status-right "#[bg=colour244,fg=colour233,bold] %d/%m #[bg=colour248,fg=colour233,bold] %H:%M:%S "
